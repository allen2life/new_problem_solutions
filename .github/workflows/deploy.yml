name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-problems-solution
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare image references
        id: image
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_name:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_ref=$image_name:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Detect image build requirement
        id: changes
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build_image=true" >> "$GITHUB_OUTPUT"
            echo "skip_image_pull=false" >> "$GITHUB_OUTPUT"
            echo "Manual run: build image."
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [[ "$base" =~ ^0+$ ]]; then
            echo "build_image=true" >> "$GITHUB_OUTPUT"
            echo "skip_image_pull=false" >> "$GITHUB_OUTPUT"
            echo "Initial push: build image."
            exit 0
          fi

          git diff --name-only "$base" "$head" | tee changed-files.txt

          if [[ ! -s changed-files.txt ]]; then
            echo "build_image=true" >> "$GITHUB_OUTPUT"
            echo "skip_image_pull=false" >> "$GITHUB_OUTPUT"
            echo "No changed files detected: build image."
            exit 0
          fi

          if awk 'NF && $0 !~ /^problems\// { found=1 } END { exit found ? 0 : 1 }' changed-files.txt; then
            echo "build_image=true" >> "$GITHUB_OUTPUT"
            echo "skip_image_pull=false" >> "$GITHUB_OUTPUT"
            echo "Application files changed: build image."
          else
            echo "build_image=false" >> "$GITHUB_OUTPUT"
            echo "skip_image_pull=true" >> "$GITHUB_OUTPUT"
            echo "Only problems/ changed: skip image build."
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.build_image == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.build_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.changes.outputs.build_image == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.sha_ref }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/rbook_deploy_key
          chmod 600 ~/.ssh/rbook_deploy_key

      - name: Trust VPS host key
        run: |
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ghcr_token_b64="$(printf '%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)"
          for attempt in 1 2 3 4 5; do
            if ssh \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=3 \
              -i ~/.ssh/rbook_deploy_key \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "APP_DIR='${{ secrets.VPS_APP_DIR }}' SERVICE_NAME='${{ secrets.VPS_SERVICE_NAME }}' BRANCH='${{ github.ref_name }}' IMAGE_REF='${{ steps.image.outputs.image_ref }}' SKIP_IMAGE_PULL='${{ steps.changes.outputs.skip_image_pull }}' GHCR_USERNAME='${{ github.actor }}' GHCR_TOKEN_B64='$ghcr_token_b64' bash -s" <<'EOF'
          set -euo pipefail
          : "${APP_DIR:=/srv/rbook}"
          : "${SERVICE_NAME:=problems-solution}"
          : "${BRANCH:=master}"
          : "${IMAGE_REF:=ghcr.io/rainboyoj/new_problem_solutions:master}"
          : "${SKIP_IMAGE_PULL:=false}"
          : "${GHCR_USERNAME:=}"
          : "${GHCR_TOKEN_B64:=}"
          export APP_DIR SERVICE_NAME BRANCH IMAGE_REF SKIP_IMAGE_PULL GHCR_USERNAME GHCR_TOKEN_B64
          cd "$APP_DIR"
          bash scripts/deploy-vps.sh
          EOF
            then
              exit 0
            fi

            echo "Deploy SSH attempt $attempt failed." >&2
            if [[ "$attempt" == "5" ]]; then
              exit 255
            fi
            sleep "$((attempt * 10))"
          done
