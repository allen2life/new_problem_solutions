services:
  problems-solution:
    image: ${IMAGE_REF:-ghcr.io/rainboyoj/new_problem_solutions:master}
    container_name: ${SERVICE_NAME:-problems-solution}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
    volumes:
      - ./problems:/app/problems:ro
    ports:
      - "127.0.0.1:3300:3000"
