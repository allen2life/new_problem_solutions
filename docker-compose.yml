services:
  problems-solution:
    image: ${IMAGE_REF:-problems-solution:deploy}
    container_name: ${SERVICE_NAME:-problems-solution}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
    volumes:
      - ./problems:/app/problems:ro
      - ./problem-sets:/app/problem-sets:ro
    ports:
      - "127.0.0.1:3300:3000"
